<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Divya 🎂❤️</title>
<style>
  :root{
    --pink: #ff8fab;
    --deep-pink: #ff5d8f;
    --lavender: #b8a1ff;
    --gold: #ffd166;
    --cream: #fff5f0;
    --dark: #4a2545;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    overflow-x:hidden;
    background: linear-gradient(160deg, #2b1030, #4a1942 45%, #6d2560 100%);
    font-family: 'Segoe UI', sans-serif;
  }

  .sky{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:40px 20px;
  }

  /* ---------- Stars ---------- */
  .star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:.8;
    animation: twinkle 2.5s infinite ease-in-out;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.2; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.4); }
  }

  /* ---------- Confetti ---------- */
  .confetti{
    position:absolute;
    top:-10%;
    width:10px;
    height:16px;
    opacity:.9;
    animation: fall linear infinite;
  }
  @keyframes fall{
    0%{ transform: translateY(0) rotate(0deg); }
    100%{ transform: translateY(110vh) rotate(360deg); }
  }

  /* ---------- Balloons ---------- */
  .balloon{
    position:absolute;
    bottom:-200px;
    width:60px;
    height:75px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: floatUp linear infinite;
    box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15), inset 8px 8px 15px rgba(255,255,255,0.25);
  }
  .balloon::after{
    content:'';
    position:absolute;
    bottom:-40px;
    left:50%;
    width:1px;
    height:40px;
    background: rgba(255,255,255,0.4);
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); }
    25%{ transform: translateY(-30vh) translateX(20px) rotate(3deg); }
    50%{ transform: translateY(-60vh) translateX(-20px) rotate(-3deg); }
    75%{ transform: translateY(-90vh) translateX(15px) rotate(2deg); }
    100%{ transform: translateY(-130vh) translateX(0) rotate(0deg); }
  }

  /* ---------- Card ---------- */
  .card{
    position:relative;
    z-index:5;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 24px;
    padding: 50px 40px 40px;
    max-width: 560px;
    width:100%;
    text-align:center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: cardIn 1.2s cubic-bezier(.2,.8,.3,1.2) both;
  }
  @keyframes cardIn{
    0%{ opacity:0; transform: translateY(60px) scale(.9); }
    100%{ opacity:1; transform: translateY(0) scale(1); }
  }

  .eyebrow{
    color: var(--gold);
    letter-spacing: 4px;
    font-size: 13px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity:0;
    animation: fadeIn 1s ease .6s forwards;
  }

  .title{
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-size: 64px;
    line-height:1.1;
    background: linear-gradient(90deg, var(--pink), var(--gold), var(--lavender));
    background-size: 200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation: shimmer 4s linear infinite, popIn .9s ease .3s both;
    margin-bottom: 6px;
  }
  @keyframes shimmer{
    to{ background-position: 200% center; }
  }
  @keyframes popIn{
    0%{ opacity:0; transform: scale(.6) rotate(-4deg); }
    60%{ opacity:1; transform: scale(1.08) rotate(1deg); }
    100%{ transform: scale(1) rotate(0deg); }
  }

  .name{
    font-size: 40px;
    font-weight:700;
    color:#fff;
    text-shadow: 0 0 20px rgba(255,141,171,0.8), 0 0 40px rgba(184,161,255,0.5);
    margin-bottom: 24px;
    opacity:0;
    animation: fadeIn 1s ease 1s forwards;
  }

  @keyframes fadeIn{
    to{ opacity:1; }
  }

  /* ---------- Cake ---------- */
  .cake-wrap{
    position:relative;
    width:140px;
    height:130px;
    margin: 10px auto 20px;
  }
  .plate{
    position:absolute;
    bottom:0; left:50%;
    transform: translateX(-50%);
    width:150px;
    height:14px;
    background: linear-gradient(180deg,#e9c7ff,#c39bff);
    border-radius:50%;
    box-shadow:0 6px 16px rgba(0,0,0,.35);
  }
  .layer{
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    border-radius:6px;
  }
  .layer.bottom{
    bottom:12px; width:120px; height:38px;
    background: linear-gradient(180deg,#ff9dc4,#ff6fa8);
  }
  .layer.top{
    bottom:48px; width:90px; height:30px;
    background: linear-gradient(180deg,#c7b3ff,#a184ff);
  }
  .drip{
    position:absolute;
    bottom:44px; left:50%; transform:translateX(-50%);
    width:96px; height:14px;
    background: repeating-linear-gradient(90deg, #fff5f0 0 8px, transparent 8px 16px);
    border-radius: 0 0 10px 10px;
    opacity:.9;
  }
  .candle{
    position:absolute;
    bottom:76px; left:50%;
    transform: translateX(-50%);
    width:6px; height:26px;
    background: linear-gradient(180deg,#fff,#ffd166);
    border-radius:2px;
  }
  .flame{
    position:absolute;
    bottom:100px; left:50%;
    transform: translateX(-50%);
    width:12px; height:18px;
    background: radial-gradient(circle at 50% 30%, #fff6c7, var(--gold) 60%, #ff8a3d 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,209,102,0.9));
  }
  @keyframes flicker{
    0%,100%{ transform: translateX(-50%) scale(1) rotate(-2deg); }
    50%{ transform: translateX(-50%) scale(1.15) rotate(3deg); }
  }

  /* ---------- Message ---------- */
  .msg{
    color: #f6ecff;
    font-size: 16px;
    line-height:1.7;
    margin: 10px auto 22px;
    max-width: 440px;
    opacity:0;
    animation: fadeIn 1s ease 1.4s forwards;
  }

  .from{
    color: var(--gold);
    font-size: 14px;
    letter-spacing:1px;
    opacity:0;
    animation: fadeIn 1s ease 1.8s forwards;
  }
  .from b{ color:#fff; }

  .hearts span{
    display:inline-block;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.3); }
  }

  /* ---------- I Love You section ---------- */
  .love-box{
    position:relative;
    margin: 8px auto 24px;
    padding: 18px 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(255,111,168,0.18), rgba(255,209,102,0.12));
    border: 1px solid rgba(255,141,171,0.4);
    opacity:0;
    animation: fadeIn 1s ease 2.1s forwards;
    overflow:hidden;
  }
  .love-text{
    font-size: 26px;
    font-weight:700;
    color:#fff;
    letter-spacing:.5px;
    animation: heartbeat 1.3s ease-in-out infinite;
    text-shadow: 0 0 18px rgba(255,93,143,0.9);
  }
  @keyframes heartbeat{
    0%,100%{ transform: scale(1); }
    25%{ transform: scale(1.08); }
    40%{ transform: scale(1); }
    55%{ transform: scale(1.12); }
    70%{ transform: scale(1); }
  }
  .big-heart{
    display:inline-block;
    color: var(--deep-pink);
    animation: heartbeat 1.3s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,93,143,0.9));
  }

  .floating-heart{
    position:absolute;
    bottom:-40px;
    font-size: 16px;
    opacity:.85;
    animation: heartUp linear infinite;
  }
  @keyframes heartUp{
    0%{ transform: translateY(0) translateX(0) scale(.8); opacity:0; }
    10%{ opacity:.9; }
    100%{ transform: translateY(-160vh) translateX(var(--drift,20px)) scale(1.2); opacity:0; }
  }
</style>
</head>
<body>

<div class="sky" id="sky">
  <div class="card">
    <div class="eyebrow">✨ आज का दिन खास है ✨</div>
    <div class="title">Happy Birthday</div>
    <div class="name">Divya 🎉</div>

    <div class="cake-wrap">
      <div class="plate"></div>
      <div class="layer bottom"></div>
      <div class="drip"></div>
      <div class="layer top"></div>
      <div class="candle"></div>
      <div class="flame"></div>
    </div>

    <div class="msg">
      Happy Birthday to the most beautiful soul in my life. I love you more than words can ever express, and I’ll keep choosing you every single day.🎂🎈
    </div>

    <div class="love-box">
      <div class="love-text"><span class="big-heart">❤️</span> I Love You Divya <span class="big-heart">❤️</span></div>
    </div>

    <div class="from">
      With love, <b>Prince</b> <span class="hearts"><span>💖</span></span>
    </div>
  </div>
</div>

<script>
  const sky = document.getElementById('sky');

  // Stars
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*3+1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*60+'%';
    s.style.animationDelay = Math.random()*3+'s';
    sky.appendChild(s);
  }

  // Confetti
  const confettiColors = ['#ff8fab','#ffd166','#b8a1ff','#7ee8c7','#ff6fa8'];
  for(let i=0;i<45;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'%';
    c.style.background = confettiColors[i % confettiColors.length];
    c.style.animationDuration = (4+Math.random()*4)+'s';
    c.style.animationDelay = (Math.random()*6)+'s';
    c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    sky.appendChild(c);
  }

  // Balloons
  const balloonColors = ['#ff6fa8','#a184ff','#ffd166','#7ee8c7','#ff8fab'];
  for(let i=0;i<8;i++){
    const b = document.createElement('div');
    b.className='balloon';
    b.style.left = (5 + Math.random()*90)+'%';
    b.style.background = `radial-gradient(circle at 30% 30%, #fff, ${balloonColors[i % balloonColors.length]})`;
    b.style.animationDuration = (10+Math.random()*6)+'s';
    b.style.animationDelay = (Math.random()*8)+'s';
    sky.appendChild(b);
  }

  // Floating hearts
  const heartEmojis = ['❤️','💖','💕','💗'];
  for(let i=0;i<20;i++){
    const h = document.createElement('div');
    h.className='floating-heart';
    h.textContent = heartEmojis[i % heartEmojis.length];
    h.style.left = Math.random()*100+'%';
    h.style.setProperty('--drift', (Math.random()*60-30)+'px');
    h.style.fontSize = (14+Math.random()*14)+'px';
    h.style.animationDuration = (6+Math.random()*5)+'s';
    h.style.animationDelay = (Math.random()*6)+'s';
    sky.appendChild(h);
  }
</script>

</body>
</html>
